name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy app

      - name: Tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          PINGWAKE_API_KEY: test-api-key-with-enough-length
          PINGWAKE_CRON_KEY: test-cron-key-with-enough-length
        run: pytest --cov=app --cov-report=term-missing
